name: Update Profile

on:
  push:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python generate_profile.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update profile SVG"